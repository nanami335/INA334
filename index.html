<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日翊庫存管理系統</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      background: #F0F4FF;
      color: #1e293b;
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    /* ── 標題 ── */
    .page-header {
      text-align: center;
      margin-bottom: 28px;
    }

    h1 {
      font-size: 1.9rem;
      color: #1E40AF;
      letter-spacing: 3px;
      font-weight: 800;
    }

    .header-sub {
      font-size: 0.8rem;
      color: #3B82F6;
      margin-top: 4px;
      letter-spacing: 1px;
    }

    .container { max-width: 980px; margin: 0 auto; }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 2px 12px rgba(30,64,175,0.08);
      margin-bottom: 20px;
      border-top: 3px solid #1E40AF;
    }

    .card h2 {
      font-size: 1.05rem;
      color: #1E40AF;
      margin-bottom: 16px;
      border-left: 4px solid #3B82F6;
      padding-left: 10px;
      font-weight: 700;
    }

    /* ── Form ── */
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 160px;
    }

    label { font-size: 0.85rem; color: #475569; font-weight: 600; }

    input[type="text"],
    input[type="number"] {
      padding: 9px 12px;
      border: 1.5px solid #bfdbfe;
      border-radius: 7px;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
      color: #1e293b;
    }

    input:focus {
      outline: none;
      border-color: #3B82F6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }

    /* ── Buttons ── */
    .btn {
      padding: 9px 20px;
      border: none;
      border-radius: 7px;
      font-size: 0.92rem;
      cursor: pointer;
      font-family: inherit;
      font-weight: 700;
      transition: background 0.18s, transform 0.1s, box-shadow 0.18s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.96); }

    .btn-primary { background: #1E40AF; color: #fff; align-self: flex-end; box-shadow: 0 2px 6px rgba(30,64,175,0.25); }
    .btn-primary:hover { background: #1e3a8a; }

    .btn-danger  { background: #dc2626; color: #fff; padding: 5px 10px; font-size: 0.79rem; }
    .btn-danger:hover  { background: #b91c1c; }

    .btn-edit    { background: #d97706; color: #fff; padding: 5px 10px; font-size: 0.79rem; }
    .btn-edit:hover    { background: #b45309; }

    .btn-in      { background: #059669; color: #fff; padding: 5px 10px; font-size: 0.79rem; }
    .btn-in:hover      { background: #047857; }

    .btn-out     { background: #64748b; color: #fff; padding: 5px 10px; font-size: 0.79rem; }
    .btn-out:hover     { background: #475569; }

    .btn-csv     { background: #1E40AF; color: #fff; }
    .btn-csv:hover     { background: #1e3a8a; }

    /* ── 訊息提示 ── */
    #msg {
      display: none;
      padding: 10px 16px;
      border-radius: 7px;
      font-size: 0.9rem;
      margin-bottom: 14px;
    }
    #msg.success { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
    #msg.error   { background: #fee2e2; color: #7f1d1d; border: 1px solid #fca5a5; }

    /* ── 庫存不足警示 ── */
    #alert-box {
      display: none;
      background: #fffbeb;
      border: 1px solid #fbbf24;
      border-left: 5px solid #d97706;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 20px;
    }
    #alert-box h3 { font-size: 0.95rem; color: #78350f; margin-bottom: 10px; font-weight: 700; }
    #alert-list { list-style: none; display: flex; flex-wrap: wrap; gap: 8px; }
    #alert-list li {
      background: #fef3c7;
      border: 1px solid #fbbf24;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 0.83rem;
      color: #451a03;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .toolbar input {
      flex: 1;
      min-width: 180px;
      padding: 9px 12px;
      border: 1.5px solid #bfdbfe;
      border-radius: 7px;
      font-size: 0.95rem;
      font-family: inherit;
    }
    .toolbar input:focus {
      outline: none;
      border-color: #3B82F6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }

    /* ── 表格 ── */
    .table-wrapper { overflow-x: auto; border-radius: 8px; }

    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }

    thead th {
      background: #1E40AF;
      color: #fff;
      padding: 12px 12px;
      text-align: left;
      font-weight: 700;
      white-space: nowrap;
      letter-spacing: 0.4px;
      user-select: none;
    }

    /* 可排序欄位 */
    thead th.sortable { cursor: pointer; }
    thead th.sortable:hover { background: #1e3a8a; }
    thead th .sort-icon { margin-left: 5px; opacity: 0.5; font-style: normal; }
    thead th.asc  .sort-icon { opacity: 1; }
    thead th.desc .sort-icon { opacity: 1; }

    /* 斑馬紋 */
    tbody tr:nth-child(odd)  { background: #f0f4ff; }
    tbody tr:nth-child(even) { background: #e0e9ff; }
    tbody tr.row-low              { background: #fee2e2 !important; }
    tbody tr.row-low:nth-child(even) { background: #fecaca !important; }
    tbody tr:hover { background: #bfdbfe !important; transition: background 0.15s; }

    td {
      padding: 10px 12px;
      vertical-align: middle;
      border-bottom: 1px solid #dbeafe;
    }

    /* ── 徽章 ── */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.77rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge-ok    { background: #d1fae5; color: #065f46; }
    .badge-low   { background: #fef3c7; color: #78350f; }
    .badge-empty { background: #fee2e2; color: #7f1d1d; }

    .btn-group { display: flex; gap: 5px; flex-wrap: wrap; }

    .empty-state { text-align: center; padding: 40px; color: #94a3b8; font-size: 0.95rem; }

    .summary { font-size: 0.83rem; color: #64748b; margin-top: 10px; text-align: right; }

    td input.inline-edit {
      width: 72px;
      padding: 4px 8px;
      border: 1.5px solid #3B82F6;
      border-radius: 5px;
      font-size: 0.88rem;
      font-family: inherit;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.5);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 14px;
      padding: 28px 32px;
      width: 320px;
      max-width: 90vw;
      box-shadow: 0 12px 40px rgba(30,64,175,0.2);
      border-top: 4px solid #1E40AF;
    }
    .modal h3 { font-size: 1.05rem; color: #1E40AF; margin-bottom: 16px; font-weight: 700; }
    .modal label { display: block; font-size: 0.85rem; color: #475569; font-weight: 600; margin-bottom: 6px; }
    .modal input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #bfdbfe;
      border-radius: 7px;
      font-size: 1rem;
      font-family: inherit;
      margin-bottom: 18px;
    }
    .modal input:focus {
      outline: none;
      border-color: #3B82F6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }
    .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-cancel  { background: #e2e8f0; color: #334155; padding: 8px 18px; font-size: 0.9rem; }
    .btn-cancel:hover { background: #cbd5e1; }
    .btn-confirm { background: #1E40AF; color: #fff; padding: 8px 18px; font-size: 0.9rem; }
    .btn-confirm:hover { background: #1e3a8a; }

    /* ── 自動補貨建議 ── */
    #restock-box { display: none; }

    #restock-box .card { border-top-color: #7c3aed; }
    #restock-box .card h2 { border-left-color: #7c3aed; color: #5b21b6; }

    .restock-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin-top: 4px; }

    .restock-table thead th {
      background: #5b21b6;
      color: #fff;
      padding: 10px 12px;
      text-align: left;
      font-weight: 700;
      white-space: nowrap;
    }

    .restock-table tbody tr:nth-child(odd)  { background: #f5f3ff; }
    .restock-table tbody tr:nth-child(even) { background: #ede9fe; }
    .restock-table tbody tr:hover { background: #ddd6fe !important; }

    .restock-table td { padding: 10px 12px; border-bottom: 1px solid #ddd6fe; vertical-align: middle; }

    .restock-qty {
      display: inline-block;
      background: #7c3aed;
      color: #fff;
      font-weight: 700;
      padding: 3px 14px;
      border-radius: 12px;
      font-size: 0.85rem;
    }

    .restock-empty { text-align: center; padding: 24px; color: #94a3b8; font-size: 0.92rem; }

    /* ── 頁腳 ── */
    .page-footer {
      text-align: center;
      font-size: 0.75rem;
      color: #94a3b8;
      margin-top: 32px;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
<div class="container">

  <div class="page-header">
    <h1>📦 日翊庫存管理系統</h1>
    <div class="header-sub">Re-Yi Distribution — Inventory Management</div>
  </div>

  <!-- 庫存不足警示 -->
  <div id="alert-box">
    <h3>⚠️ 庫存不足警示</h3>
    <ul id="alert-list"></ul>
  </div>

  <!-- 新增商品 -->
  <div class="card">
    <h2>新增商品</h2>
    <div id="msg"></div>
    <div class="form-row">
      <div class="form-group">
        <label for="name">商品名稱</label>
        <input type="text" id="name" placeholder="例：A4 影印紙" maxlength="50">
      </div>
      <div class="form-group">
        <label for="qty">目前數量</label>
        <input type="number" id="qty" placeholder="0" min="0">
      </div>
      <div class="form-group">
        <label for="minQty">最低庫存量</label>
        <input type="number" id="minQty" placeholder="0" min="0">
      </div>
      <button class="btn btn-primary" onclick="addItem()">＋ 新增</button>
    </div>
  </div>

  <!-- 自動補貨建議 -->
  <div id="restock-box">
    <div class="card">
      <h2>🛒 自動補貨建議</h2>
      <div class="table-wrapper">
        <table class="restock-table">
          <thead>
            <tr>
              <th>#</th>
              <th>商品名稱</th>
              <th>目前數量</th>
              <th>最低庫存量</th>
              <th>建議補貨數量</th>
            </tr>
          </thead>
          <tbody id="restock-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 庫存列表 -->
  <div class="card">
    <h2>庫存列表</h2>
    <div class="toolbar">
      <input type="text" id="search" placeholder="🔍 搜尋商品名稱…" oninput="renderTable()">
      <button class="btn btn-csv" onclick="exportCSV()">⬇ 匯出 CSV</button>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th class="sortable" data-col="name"    onclick="setSort('name')">商品名稱  <i class="sort-icon" id="si-name">⇅</i></th>
            <th class="sortable" data-col="qty"     onclick="setSort('qty')">目前數量  <i class="sort-icon" id="si-qty">⇅</i></th>
            <th class="sortable" data-col="minQty"  onclick="setSort('minQty')">最低庫存量 <i class="sort-icon" id="si-minQty">⇅</i></th>
            <th>狀態</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="summary" id="summary"></div>
  </div>

</div>

<!-- 進出貨 Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <h3 id="modal-title">進貨</h3>
    <label id="modal-label">進貨數量</label>
    <input type="number" id="modal-input" min="1" placeholder="請輸入數量">
    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="closeModalDirect()">取消</button>
      <button class="btn btn-confirm" onclick="confirmStock()">確認</button>
    </div>
  </div>
</div>

<footer class="page-footer">
  Powered by Claude Code &mdash; 日翊 AI 內訓 2026/4/23
</footer>

<script>
  const STORAGE_KEY = 'inventory_items';
  let _modalId   = null;
  let _modalMode = null;
  let _memStore  = null;

  // 排序狀態
  let _sortCol = null;   // 'name' | 'qty' | 'minQty'
  let _sortDir = 'asc';  // 'asc' | 'desc'

  /* ── Storage ── */
  function load() {
    try {
      const raw  = localStorage.getItem(STORAGE_KEY);
      const data = raw ? JSON.parse(raw) : [];
      _memStore  = data;
      return data;
    } catch {
      return _memStore || [];
    }
  }

  function save(items) {
    _memStore = items;
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); } catch {}
  }

  /* ── 訊息 ── */
  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent  = text;
    el.className    = type;
    el.style.display = 'block';
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.style.display = 'none'; }, 3000);
  }

  /* ── 新增 ── */
  function addItem() {
    const name   = document.getElementById('name').value.trim();
    const qty    = parseInt(document.getElementById('qty').value, 10);
    const minQty = parseInt(document.getElementById('minQty').value, 10);

    if (!name)                  return showMsg('請輸入商品名稱', 'error');
    if (isNaN(qty))             return showMsg('請輸入目前數量', 'error');
    if (isNaN(minQty))          return showMsg('請輸入最低庫存量', 'error');
    if (qty < 0 || minQty < 0) return showMsg('數量不可為負數', 'error');

    const items = load();
    if (items.find(i => i.name === name)) return showMsg(`商品「${name}」已存在`, 'error');

    items.push({ id: Date.now(), name, qty, minQty });
    save(items);
    showMsg(`已新增「${name}」`, 'success');
    document.getElementById('name').value   = '';
    document.getElementById('qty').value    = '';
    document.getElementById('minQty').value = '';
    renderAll();
  }

  /* ── 刪除 ── */
  function deleteItem(id) {
    if (!confirm('確定要刪除這項商品嗎？')) return;
    save(load().filter(i => i.id !== id));
    renderAll();
  }

  /* ── 行內編輯 ── */
  function startEdit(id) {
    const item = load().find(i => i.id === id);
    if (!item) return;
    const row = document.querySelector(`tr[data-id="${id}"]`);
    row.querySelector('.qty-cell').innerHTML =
      `<input class="inline-edit" type="number" value="${item.qty}" min="0" id="eq-${id}">`;
    row.querySelector('.min-cell').innerHTML =
      `<input class="inline-edit" type="number" value="${item.minQty}" min="0" id="em-${id}">`;
    row.querySelector('.edit-btn').style.display  = 'none';
    row.querySelector('.save-btn').style.display  = 'inline-block';
  }

  function saveEdit(id) {
    const newQty    = parseInt(document.getElementById(`eq-${id}`).value, 10);
    const newMinQty = parseInt(document.getElementById(`em-${id}`).value, 10);
    if (isNaN(newQty) || isNaN(newMinQty) || newQty < 0 || newMinQty < 0)
      return showMsg('請輸入有效的數量（不可為負）', 'error');
    save(load().map(i => i.id === id ? { ...i, qty: newQty, minQty: newMinQty } : i));
    showMsg('已更新庫存', 'success');
    renderAll();
  }

  /* ── 進出貨 Modal ── */
  function openModal(id, mode) {
    _modalId   = id;
    _modalMode = mode;
    const item = load().find(i => i.id === id);
    document.getElementById('modal-title').textContent =
      mode === 'in' ? `📥 進貨：${item.name}` : `📤 出貨：${item.name}`;
    document.getElementById('modal-label').textContent =
      mode === 'in' ? '進貨數量' : '出貨數量';
    document.getElementById('modal-input').value = '';
    document.getElementById('modal-overlay').classList.add('open');
    setTimeout(() => document.getElementById('modal-input').focus(), 50);
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
  }

  function closeModalDirect() {
    document.getElementById('modal-overlay').classList.remove('open');
    _modalId = _modalMode = null;
  }

  function confirmStock() {
    const delta = parseInt(document.getElementById('modal-input').value, 10);
    if (isNaN(delta) || delta <= 0) return alert('請輸入大於 0 的數量');
    let overStock = false;
    const items = load().map(i => {
      if (i.id !== _modalId) return i;
      const newQty = _modalMode === 'in' ? i.qty + delta : i.qty - delta;
      if (newQty < 0) { overStock = true; return i; }
      return { ...i, qty: newQty };
    });
    if (overStock) return alert('出貨數量超過現有庫存！');
    save(items);
    showMsg(_modalMode === 'in' ? `已進貨 ${delta} 件` : `已出貨 ${delta} 件`, 'success');
    closeModalDirect();
    renderAll();
  }

  /* ── 匯出 CSV ── */
  function exportCSV() {
    const items = load();
    if (items.length === 0) return alert('目前沒有商品可匯出');
    const header = '商品名稱,目前數量,最低庫存量,狀態';
    const rows = items.map(i => {
      const status = i.qty === 0 ? '已售罄' : i.qty <= i.minQty ? '庫存偏低' : '正常';
      return `"${i.name}",${i.qty},${i.minQty},"${status}"`;
    });
    const csv  = '\uFEFF' + [header, ...rows].join('\r\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `日翊庫存清單_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  /* ── 排序 ── */
  function setSort(col) {
    if (_sortCol === col) {
      _sortDir = _sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      _sortCol = col;
      _sortDir = 'asc';
    }
    updateSortIcons();
    renderTable();
  }

  function updateSortIcons() {
    ['name','qty','minQty'].forEach(col => {
      const th = document.querySelector(`th[data-col="${col}"]`);
      const si = document.getElementById(`si-${col}`);
      if (!th || !si) return;
      th.classList.remove('asc','desc');
      si.textContent = '⇅';
      if (_sortCol === col) {
        th.classList.add(_sortDir);
        si.textContent = _sortDir === 'asc' ? '↑' : '↓';
      }
    });
  }

  function sortItems(items) {
    if (!_sortCol) return items;
    return [...items].sort((a, b) => {
      let av = a[_sortCol], bv = b[_sortCol];
      if (typeof av === 'string') av = av.toLowerCase();
      if (typeof bv === 'string') bv = bv.toLowerCase();
      if (av < bv) return _sortDir === 'asc' ? -1 : 1;
      if (av > bv) return _sortDir === 'asc' ?  1 : -1;
      return 0;
    });
  }

  /* ── 警示 ── */
  function renderAlert(items) {
    const low      = items.filter(i => i.qty <= i.minQty);
    const alertBox = document.getElementById('alert-box');
    if (low.length === 0) { alertBox.style.display = 'none'; return; }
    alertBox.style.display = 'block';
    document.getElementById('alert-list').innerHTML = low.map(i => {
      const tag = i.qty === 0 ? '已售罄' : `剩 ${i.qty}（最低 ${i.minQty}）`;
      return `<li>⚠ ${escHtml(i.name)}｜${tag}</li>`;
    }).join('');
  }

  /* ── 表格 ── */
  function badge(qty, minQty) {
    if (qty === 0)     return '<span class="badge badge-empty">已售罄</span>';
    if (qty <= minQty) return '<span class="badge badge-low">庫存偏低</span>';
    return '<span class="badge badge-ok">正常</span>';
  }

  function renderTable() {
    const allItems = load();
    const q        = document.getElementById('search').value.trim().toLowerCase();
    const filtered = q ? allItems.filter(i => i.name.toLowerCase().includes(q)) : allItems;
    const result   = sortItems(filtered);
    const tbody    = document.getElementById('tbody');

    if (result.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">${
        q ? '找不到符合的商品' : '尚未新增任何商品，請使用上方表單新增'
      }</div></td></tr>`;
      document.getElementById('summary').textContent = '';
      return;
    }

    tbody.innerHTML = result.map((item, idx) => {
      const isLow = item.qty <= item.minQty;
      return `
      <tr data-id="${item.id}" class="${isLow ? 'row-low' : ''}">
        <td>${idx + 1}</td>
        <td>${escHtml(item.name)}</td>
        <td class="qty-cell">${item.qty}</td>
        <td class="min-cell">${item.minQty}</td>
        <td>${badge(item.qty, item.minQty)}</td>
        <td>
          <div class="btn-group">
            <button class="btn btn-in"  onclick="openModal(${item.id},'in')">進貨</button>
            <button class="btn btn-out" onclick="openModal(${item.id},'out')">出貨</button>
            <button class="btn btn-edit edit-btn" onclick="startEdit(${item.id})">編輯</button>
            <button class="btn btn-primary save-btn" style="display:none;padding:5px 10px;font-size:0.79rem" onclick="saveEdit(${item.id})">儲存</button>
            <button class="btn btn-danger" onclick="deleteItem(${item.id})">刪除</button>
          </div>
        </td>
      </tr>`;
    }).join('');

    const low = result.filter(i => i.qty <= i.minQty && i.qty > 0).length;
    const out = result.filter(i => i.qty === 0).length;
    document.getElementById('summary').textContent =
      `共 ${result.length} 項商品｜庫存偏低：${low} 項｜已售罄：${out} 項`;
  }

  /* ── 自動補貨建議 ── */
  function renderRestock(items) {
    const low   = items.filter(i => i.qty <= i.minQty);
    const box   = document.getElementById('restock-box');
    const tbody = document.getElementById('restock-tbody');

    if (low.length === 0) { box.style.display = 'none'; return; }
    box.style.display = 'block';

    tbody.innerHTML = low.map((item, idx) => {
      const suggest = item.minQty * 2 - item.qty;
      return `
      <tr>
        <td>${idx + 1}</td>
        <td>${escHtml(item.name)}</td>
        <td>${item.qty}</td>
        <td>${item.minQty}</td>
        <td><span class="restock-qty">＋ ${suggest} 件</span></td>
      </tr>`;
    }).join('');
  }

  function renderAll() {
    const items = load();
    renderAlert(items);
    renderRestock(items);
    renderTable();
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  ['name','qty','minQty'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });
  });

  document.getElementById('modal-input').addEventListener('keydown', e => {
    if (e.key === 'Enter')  confirmStock();
    if (e.key === 'Escape') closeModalDirect();
  });

  renderAll();
</script>
</body>
</html>
